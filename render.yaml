# Render Blueprint — API web service only
# https://render.com/docs/blueprint-spec
#
# PostgreSQL is NOT created here — Render allows only ONE free database
# per account. Create Postgres manually (or use Neon) and set DATABASE_URL.

services:
  - type: web
    name: af-md-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOY_TARGET
        value: render
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
